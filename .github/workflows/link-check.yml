name: Link Check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - add-github-actions
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check links in site content
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress index.md _posts/**/*.md
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
